name: Package DeerFlow

on:
  push:
    tags:
      - 'v*'  # 版本标签触发
  workflow_dispatch:  # 手动触发
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: false
        type: boolean

jobs:
  package-source:
    name: Package Source Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get version info
        id: version
        run: |
          if [[ ${{ github.ref }} == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(date +'%Y%m%d')-$(git rev-parse --short HEAD)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Create source archives
        run: |
          mkdir -p dist
          
          # 排除不必要的文件
          tar czf "dist/deer-flow-${{ steps.version.outputs.VERSION }}.tar.gz" \
            --exclude=.git \
            --exclude=.github \
            --exclude=dist \
            --exclude=node_modules \
            --exclude=__pycache__ \
            --exclude=*.pyc \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.next \
            --exclude=.deer-flow \
            --exclude=.langgraph_api \
            --exclude=logs \
            --exclude=*.log \
            --exclude=*.db \
            --exclude=*.sqlite \
            .
          
          zip -r "dist/deer-flow-${{ steps.version.outputs.VERSION }}.zip" . \
            -x "*.git*" \
            "*.github*" \
            "dist/*" \
            "node_modules/*" \
            "__pycache__/*" \
            "*.pyc" \
            ".pytest_cache/*" \
            ".ruff_cache/*" \
            ".next/*" \
            ".deer-flow/*" \
            ".langgraph_api/*" \
            "logs/*" \
            "*.log" \
            "*.db" \
            "*.sqlite"
          
          ls -lh dist/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deer-flow-source-${{ steps.version.outputs.VERSION }}
          path: dist/
          retention-days: 7
          
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true